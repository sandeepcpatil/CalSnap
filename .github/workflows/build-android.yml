name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Patch expo-modules-core for AGP 8.3+ compatibility
        working-directory: mobile
        run: |
          PLUGIN="node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle"
          if [ -f "$PLUGIN" ]; then
            # AGP 8.3+ removed project.android.finalizeDsl — replace with androidComponents
            sed -i 's/project\.android\.finalizeDsl/project.androidComponents.finalizeDsl/g' "$PLUGIN"
            # AGP 8.3+ renamed applicationIdSuffix accessor
            sed -i 's/\.applicationIdSuffix\.get()/.applicationIdSuffix.orNull ?: ""/g' "$PLUGIN"
            echo "Patched: $PLUGIN"
            grep -n "finalizeDsl\|applicationIdSuffix" "$PLUGIN" || echo "No remaining incompatible lines found"
          else
            echo "Plugin file not found, skipping patch"
          fi

      - name: Build Android AAB (local)
        working-directory: mobile
        run: eas build --platform android --profile production --local --non-interactive --output ./calsnap.aab
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          EXPO_PUBLIC_VERSION_CODE: ${{ github.run_number }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: calsnap-android-v${{ github.run_number }}
          path: mobile/calsnap.aab
          retention-days: 7
