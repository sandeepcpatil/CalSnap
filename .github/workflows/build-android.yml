name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android SDK licenses & install SDK 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>&1 | tail -3 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"
          # Use the NDK already on the runner (26.3.11579264 is pre-installed)
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "NDK location: $ANDROID_NDK_ROOT"
          ls "$ANDROID_NDK_ROOT" | head -5

      - name: Generate CI upload keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/calsnap-upload.keystore \
            -alias calsnap-upload \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass calsnap_ci -keypass calsnap_ci \
            -dname "CN=CalSnap CI, O=Sanverse, C=IN" -noprompt

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Set versionCode
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$((COUNT + 10))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building with versionCode: $VERSION_CODE"

      - name: Expo Prebuild
        working-directory: mobile
        run: npx expo prebuild --platform android --non-interactive --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}
          EXPO_PUBLIC_VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}

      - name: Configure Gradle signing & NDK path
        working-directory: mobile/android
        run: |
          cp /tmp/calsnap-upload.keystore app/calsnap-upload.keystore

          # Pin NDK path explicitly — three ways so AGP definitely finds it
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

          echo "MYAPP_UPLOAD_STORE_FILE=calsnap-upload.keystore" >> gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=calsnap-upload" >> gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=calsnap_ci" >> gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=calsnap_ci" >> gradle.properties

      - name: Build AAB with Gradle
        working-directory: mobile/android
        run: |
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: calsnap-android-v${{ github.run_number }}
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-v${{ github.run_number }}
          path: /tmp/gradle-build.log
          retention-days: 3
